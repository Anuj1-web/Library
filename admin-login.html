<style>

<body>

<header>

</div>

<div class="header-actions">

🏠 Home Page

All Students

Active

Inactive

Due Fees

</div>

<div class="container">

<div class="stats">

</div>

<div class="stat-card">

<p>Active Students</p>

<div class="stat-card">
<h2 id="inactiveStudents">0</h2>

</div>

<thead>

<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Mobile</th>
<th>Fee</th>
<th>Status</th>
<th>Due Date</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

</div>

<script>

let currentFilter = "all";

function getStudents(){

return JSON.parse(
localStorage.getItem("students")
) || [];

}

function getStatus(student){

const today =
new Date();

const dueDate =
new Date(student.nextDueDate);

return today > dueDate
? "Inactive"
: "Active";

}

function filterStudents(type){

currentFilter = type;

renderStudents();

}
  function updateStats(){

const students =
getStudents();

let active = 0;
let inactive = 0;

students.forEach(student=>{

const status =
getStatus(student);

if(status==="Active"){
active++;
}else{
inactive++;
}

});

document.getElementById(
"totalStudents"
).innerText =
students.length;

document.getElementById(
"activeStudents"
).innerText =
active;

document.getElementById(
"inactiveStudents"
).innerText =
inactive;

document.getElementById(
"dueStudents"
).innerText =
inactive;

}

function renderStudents(){

const students =
getStudents();

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

const table =
document
.getElementById("studentTable");

table.innerHTML = "";

students

.filter(student=>{

const status =
getStatus(student);

if(
currentFilter==="active" &&
status!=="Active"
){
return false;
}

if(
(currentFilter==="inactive" ||
currentFilter==="due")
&&
status!=="Inactive"
){
return false;
}

return true;

})

.filter(student=>{

return (
(student.name || "")
.toLowerCase()
.includes(search)
||
(student.id || "")
.toLowerCase()
.includes(search)
);

})

.forEach(student=>{

const status =
getStatus(student);

table.innerHTML += `

<tr>

<td>

${
student.photo
?
`<img
src="${student.photo}"
class="student-photo">`
:
"👤"
}

</td>

<td>${student.id}</td>

<td>${student.name}</td>

<td>${student.course || "-"}</td>

<td>${student.mobile || "-"}</td>

<td>₹${student.fee || 0}</td>

<td>

<span class="${
status==="Active"
?
"status-active"
:
"status-inactive"
}">
${status}
</span>

</td>

<td>
${student.nextDueDate || "-"}
</td>

<td>

<button
class="action-btn view-btn"
onclick="viewStudent('${student.id}')">
View
</button>

<button
class="action-btn edit-btn"
onclick="editStudent('${student.id}')">
Edit
</button>

<button
class="action-btn renew-btn"
onclick="renewMembership('${student.id}')">
Renew
</button>

<button
class="action-btn delete-btn"
onclick="deleteStudent('${student.id}')">
Delete
</button>

</td>

</tr>

`;

});

updateStats();

}

function viewStudent(id){

window.location.href =
"student.html?id=" + id;

}

function editStudent(id){

window.location.href =
"edit-student.html?id=" + id;

}
  function renewMembership(id){

const confirmPayment =
confirm(
"Have you received the fee payment from this student?"
);

if(!confirmPayment){
return;
}

let students =
getStudents();

const index =
students.findIndex(
s => s.id === id
);

if(index === -1){
return;
}

let currentDueDate =
new Date(
students[index].nextDueDate
);

currentDueDate.setMonth(
currentDueDate.getMonth() + 1
);

students[index].nextDueDate =
currentDueDate
.toISOString()
.split("T")[0];

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert(
"Membership Renewed Successfully"
);

renderStudents();

}

function deleteStudent(id){

const confirmDelete =
confirm(
"Delete this student permanently?"
);

if(!confirmDelete){
return;
}

let students =
getStudents();

students =
students.filter(
s => s.id !== id
);

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert(
"Student Deleted Successfully"
);

renderStudents();

}
