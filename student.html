<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Membership | Education Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0B1120;
color:white;
min-height:100vh;
}

header{
position:sticky;
top:0;
z-index:100;
padding:20px 6%;
background:rgba(15,23,42,.9);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(245,158,11,.15);
}

.logo{
font-size:30px;
font-weight:900;
text-decoration:none;
color:#FBBF24;
}

.logo span{
color:white;
}

.container{
max-width:1400px;
margin:auto;
padding:50px 6%;
}

/* ==========================
   MEMBERSHIP CARD
========================== */

.membership-card{

background:
linear-gradient(
135deg,
rgba(245,158,11,.15),
rgba(255,255,255,.03)
);

border:1px solid rgba(245,158,11,.25);

backdrop-filter:blur(20px);

border-radius:30px;

padding:40px;

margin-bottom:40px;

position:relative;

overflow:hidden;

}

.membership-card::before{

content:"";

position:absolute;

width:350px;
height:350px;

background:#F59E0B;

border-radius:50%;

filter:blur(180px);

opacity:.15;

top:-100px;
right:-100px;

}

.card-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:35px;

flex-wrap:wrap;
gap:15px;

}

.library-title{

font-size:34px;
font-weight:900;
color:#FBBF24;

}

.status{

padding:12px 22px;

border-radius:50px;

font-weight:700;

}

.active{
background:rgba(34,197,94,.15);
color:#22C55E;
}

.due{
background:rgba(239,68,68,.15);
color:#EF4444;
}

.card-content{

display:grid;

grid-template-columns:
260px 1fr;

gap:40px;

align-items:center;

}

.student-photo{

width:240px;
height:240px;

border-radius:25px;

object-fit:cover;

border:3px solid rgba(245,158,11,.3);

}

.photo-placeholder{

width:240px;
height:240px;

border-radius:25px;

background:#1E293B;

display:flex;
align-items:center;
justify-content:center;

font-size:90px;

}

.student-name{

font-size:42px;
font-weight:900;

margin-bottom:10px;

}

.student-id{

color:#FBBF24;

font-size:18px;

margin-bottom:25px;

font-weight:700;

}

.quick-info{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:15px;

}

.quick-card{

background:
rgba(255,255,255,.04);

padding:16px;

border-radius:16px;

}

.quick-label{

font-size:13px;
opacity:.7;

margin-bottom:6px;

}

.quick-value{

font-weight:700;

}

/* ==========================
   DETAILS
========================== */

.details-section{

background:
rgba(255,255,255,.04);

border:
1px solid rgba(245,158,11,.15);

padding:35px;

border-radius:25px;

}

.details-title{

font-size:28px;
font-weight:800;

margin-bottom:25px;

color:#FBBF24;

}

.details-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:20px;

}

.detail-box{

background:
rgba(255,255,255,.03);

padding:18px;

border-radius:16px;

}

.detail-label{

font-size:13px;

opacity:.7;

margin-bottom:8px;

}

.detail-value{

font-weight:700;

word-break:break-word;

}

.address-box{

margin-top:20px;

padding:20px;

background:
rgba(255,255,255,.03);

border-radius:16px;

}

/* ==========================
   ERROR PAGE
========================== */

.not-found{

display:none;

text-align:center;

padding:100px 20px;

}

.not-found h1{

font-size:50px;

color:#FBBF24;

margin-bottom:20px;

}

.not-found p{

opacity:.8;

margin-bottom:25px;

}

.not-found a{

display:inline-block;

padding:15px 30px;

background:#F59E0B;

color:black;

font-weight:700;

text-decoration:none;

border-radius:12px;

}

/* ==========================
   MOBILE
========================== */

@media(max-width:900px){

.card-content{
grid-template-columns:1fr;
}

.student-photo,
.photo-placeholder{
margin:auto;
}

.student-name{
text-align:center;
font-size:32px;
}

.student-id{
text-align:center;
}

.quick-info{
grid-template-columns:1fr;
}

.details-grid{
grid-template-columns:1fr;
}

}

.action-buttons{
display:flex;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.action-buttons button{
padding:14px 22px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
background:#F59E0B;
color:black;
}

.delete-btn{
background:#DC2626 !important;
color:white !important;
}

.warning-box{
margin-bottom:25px;
padding:20px;
border-radius:18px;
background:rgba(239,68,68,.12);
border:1px solid rgba(239,68,68,.3);
color:#EF4444;
font-weight:700;
}
</style>

</head>

<body>

<header>

<a href="index.html" class="logo">
Education <span>Library</span>
</a>

</header>

<div class="container">

<div id="studentContent"></div>

<div id="notFound" class="not-found">

<h1>Record Not Found</h1>

<p>
No student exists with this Library ID.
</p>

<a href="index.html">
Back To Home
</a>

</div>

</div>

<script>

/* ==========================
   GET ID FROM URL
========================== */

const params =
new URLSearchParams(
window.location.search
);

const studentId =
params.get("id");

/* ==========================
   LOAD STUDENT
========================== */

function loadStudent(){

if(!studentId){

showNotFound();
return;

}

const students =
JSON.parse(
localStorage.getItem("students")
) || [];

const student =
students.find(
s => s.id === studentId
);

if(!student){

showNotFound();
return;

}

const today =
new Date();

const dueDate =
new Date(student.nextDueDate);

const isInactive =
today > dueDate;

const statusText =
isInactive
? "INACTIVE"
: "ACTIVE";

const statusClass =
isInactive
? "due"
: "active";

const photoHtml =
student.photo
? `<img src="${student.photo}" class="student-photo">`
: `<div class="photo-placeholder">👤</div>`;

document
.getElementById("studentContent")
.innerHTML = `

<div class="membership-card">

<div class="card-header">

<div class="library-title">
EDUCATION LIBRARY
</div>

<div class="status ${statusClass}">
${statusText}
</div>

</div>

<div class="card-content">

${photoHtml}

<div>

<div class="student-name">
${student.name}
</div>

<div class="student-id">
Library ID : ${student.id}
</div>

<div class="quick-info">

<div class="quick-card">
<div class="quick-label">
Membership Status
</div>
<div class="quick-value">
${statusText}
</div>
</div>

<div class="quick-card">
<div class="quick-label">
Due Date
</div>
<div class="quick-value">
${student.nextDueDate}
</div>
</div>

<div class="quick-card">
<div class="quick-label">
Course
</div>
<div class="quick-value">
${student.course || "-"}
</div>
</div>

<div class="quick-card">
<div class="quick-label">
Monthly Fee
</div>
<div class="quick-value">
₹${student.fee || 0}
</div>
</div>

</div>

<div class="action-buttons">

<button onclick="editStudent()">
Edit Student
</button>

<button class="delete-btn"
onclick="deleteStudent()">
Delete Student
</button>

</div>

</div>

</div>

</div>

${
isInactive
?
`
<div class="warning-box">

⚠ Membership Expired

Your membership has become inactive because the fee due date has passed.

</div>
`
:
""
}

<div class="details-section">

<div class="details-title">
Student Details
</div>

<div class="details-grid">

<div class="detail-box">
<div class="detail-label">Full Name</div>
<div class="detail-value">${student.name}</div>
</div>

<div class="detail-box">
<div class="detail-label">Father Name</div>
<div class="detail-value">${student.fatherName || "-"}</div>
</div>

<div class="detail-box">
<div class="detail-label">Mobile Number</div>
<div class="detail-value">${student.mobile || "-"}</div>
</div>

<div class="detail-box">
<div class="detail-label">Email</div>
<div class="detail-value">${student.email || "-"}</div>
</div>

<div class="detail-box">
<div class="detail-label">Course</div>
<div class="detail-value">${student.course || "-"}</div>
</div>

<div class="detail-box">
<div class="detail-label">Joining Date</div>
<div class="detail-value">${student.joiningDate || "-"}</div>
</div>

<div class="detail-box">
<div class="detail-label">Monthly Fee</div>
<div class="detail-value">₹${student.fee || 0}</div>
</div>

<div class="detail-box">
<div class="detail-label">Next Due Date</div>
<div class="detail-value">${student.nextDueDate}</div>
</div>

</div>

<div class="address-box">

<div class="detail-label">
Address
</div>

<div class="detail-value">
${student.address || "-"}
</div>

</div>

</div>

`;

}

/* ==========================
   EDIT STUDENT
========================== */

function editStudent(){

let students =
JSON.parse(
localStorage.getItem("students")
) || [];

const index =
students.findIndex(
s => s.id === studentId
);

if(index === -1){
return;
}

let student =
students[index];

const newName =
prompt(
"Student Name",
student.name
);

if(newName === null){
return;
}

const newMobile =
prompt(
"Mobile Number",
student.mobile
);

if(newMobile === null){
return;
}

const newCourse =
prompt(
"Course",
student.course
);

if(newCourse === null){
return;
}

student.name = newName;
student.mobile = newMobile;
student.course = newCourse;

students[index] = student;

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert(
"Student Updated Successfully"
);

location.reload();

}

/* ==========================
   DELETE STUDENT
========================== */

function deleteStudent(){

const confirmDelete =
confirm(
"Delete this student permanently?"
);

if(!confirmDelete){
return;
}

let students =
JSON.parse(
localStorage.getItem("students")
) || [];

students =
students.filter(
s => s.id !== studentId
);

localStorage.setItem(
"students",
JSON.stringify(students)
);

alert(
"Student Deleted Successfully"
);

window.location.href =
"index.html";

}

/* ==========================
   NOT FOUND
========================== */

function showNotFound(){

document
.getElementById("studentContent")
.style.display="none";

document
.getElementById("notFound")
.style.display="block";

}

loadStudent();

</script>

</body>
</html>
